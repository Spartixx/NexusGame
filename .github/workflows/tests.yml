# .github/workflows/tests.yml
# Pipeline CI/CD — NexusGame Test Suite
#
# TODO — Ce fichier est un squelette à compléter.
# Votre pipeline doit exécuter les tests dans le bon ordre.
# Documentez dans le README :
#   - Pourquoi cet ordre d'exécution ?
#   - Qu'avez-vous choisi de mettre dans la CI vs de laisser en local ?
#   - Pourquoi ce choix ?

name: NexusGame CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1 : Tests unitaires ────────────────────────────────────────────────
  unit-tests:
    name: Tests unitaires
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          pip install flask pytest pytest-html pytest-cov

      - name: Lancer les tests unitaires
        run: |
          pytest tests/test_unit.py -v --cov=app_gamestore --cov-report=html:reports/coverage --html=reports/unit.html

      - name: Uploader les rapports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-reports
          path: |
            reports/coverage/
            reports/unit.html
