# .github/workflows/tests.yml
# Pipeline CI/CD — NexusGame Test Suite
#
# TODO — Ce fichier est un squelette à compléter.
# Votre pipeline doit exécuter les tests dans le bon ordre.
# Documentez dans le README :
#   - Pourquoi cet ordre d'exécution ?
#   - Qu'avez-vous choisi de mettre dans la CI vs de laisser en local ?
#   - Pourquoi ce choix ?

name: NexusGame CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1 : Tests unitaires ────────────────────────────────────────────────
  unit-tests:
    name: Tests unitaires
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          pip install flask pytest pytest-html pytest-cov

      - name: Lancer les tests unitaires
        run: |
          pytest tests/test_unit.py -v --cov=app_gamestore --cov-report=html:reports/coverage --html=reports/unit.html

      - name: Uploader les rapports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-reports
          path: |
            reports/coverage/
            reports/unit.html
  # ── Job 2 : Tests d'intégration ───────────────────────────────────────────
  integration-tests:
    name: Tests d'intégration
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Démarrer l'API GameStore
        run: |
          pip install flask
          python app_gamestore.py & sleep 2
          curl --fail http://localhost:5000/health

      - name: Installer les dépendances
        run: |
          pip install flask pytest pytest-html requests

      - name: Lancer les tests d'intégration
        run: |
           pytest tests/test_integration.py -v -m integration
  # ── Job 3 : Tests Newman ───────────────────────────────────────────────────
  api-tests:
    name: Tests API Newman
    runs-on: ubuntu-latest
    needs: integration-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Démarrer l'API GameStore
        run: |
          pip install flask
          python app_gamestore.py & sleep 2
          curl --fail http://localhost:5000/health

      - name: Lancer Newman
        run: |
          mkdir -p reports
          newman run "tests/nexus_game.json" \
            --env-var "base_url=http://localhost:5000" \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export reports/newman.html

      - name: Uploader le rapport Newman
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: |
            reports/newman.html
  # ── Job 4 : Tests UI Playwright ────────────────────────────────────────────
  ui-tests:
    name: Tests UI Playwright
    runs-on: ubuntu-latest
    needs: api-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          pip install flask playwright pytest-playwright pytest-html
          playwright install chromium --with-deps

      - name: Démarrer l'API GameStore
        run: |
          pip install flask
          python app_gamestore.py & sleep 2
          curl --fail http://localhost:5000/health

      - name: Lancer les tests UI
        run: |
          mkdir -p reports screenshots
          pytest tests/test_ui.py -v \
            --html=reports/playwright_report.html \
            --self-contained-html

      - name: Uploader screenshots et rapport
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-reports
          path: |
            reports/playwright_report.html
            screenshots/

  owasp-tests:
    name: Tests OWASP
    runs-on: ubuntu-latest
    needs: ui-tests
    steps:
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:5000'
          fail_action: false

      - name: Upload rapport ZAP
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap_report.html
